name: CI/CD Pipeline for Subscription Service

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  ALLURE_RESULTS_DIR: allure-results

jobs:
  # Unit Tests
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm run test:unit
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-jest-node${{ matrix.node-version }}
          path: allure-results/

  # API Tests
  api-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - name: Start server
        run: |
          npm start &
          npx wait-on http://localhost:3000 --timeout 30000
      - run: npm run test:api
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-cucumber-node${{ matrix.node-version }}
          path: allure-results/

  # UI Tests - только Chromium
  ui-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Start server
        run: |
          npm start &
          npx wait-on http://localhost:3000 --timeout 30000
      - run: npm run test:ui
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-playwright-node${{ matrix.node-version }}
          path: allure-results/

  # Generate Allure Report
  allure-report:
    runs-on: ubuntu-latest
    needs: [unit-tests, api-tests, ui-tests]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          path: all-allure-results/
      - name: Merge results
        run: |
          mkdir -p merged-allure-results
          find all-allure-results -name "*.json" -exec cp {} merged-allure-results/ \;
          find all-allure-results -name "*.txt" -exec cp {} merged-allure-results/ \;
      - name: Generate report
        run: npx allure generate merged-allure-results --clean -o allure-report
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          destination_dir: allure-reports/${{ github.run_number }}

  # Telegram Notification
  notify-telegram:
    runs-on: ubuntu-latest
    needs: [unit-tests, api-tests, ui-tests]
    if: always()
    steps:
      - name: Check status
        id: check
        run: |
          if [[ "${{ needs.unit-tests.result }}" == "success" ]] && \
             [[ "${{ needs.api-tests.result }}" == "success" ]] && \
             [[ "${{ needs.ui-tests.result }}" == "success" ]]; then
            echo "status=✅ PASSED" >> $GITHUB_OUTPUT
          else
            echo "status=❌ FAILED" >> $GITHUB_OUTPUT
          fi
      - name: Send Telegram
        uses: appleboy/telegram-action@master
        if: ${{ secrets.TELEGRAM_BOT_TOKEN != '' }}
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            CI/CD Pipeline - Subscription Service
            
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            
            📊 Results: ${{ steps.check.outputs.status }}
            
            Unit Tests: ${{ needs.unit-tests.result }}
            API Tests: ${{ needs.api-tests.result }}
            UI Tests: ${{ needs.ui-tests.result }}