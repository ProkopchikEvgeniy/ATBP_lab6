name: CI/CD Pipeline for Subscription Service

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  ALLURE_RESULTS_DIR: allure-results

jobs:
  # ============================================
  # JOB 1: Unit Tests (Jest + Allure)
  # ============================================
  unit-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('package-lock.json') }}
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run unit tests (Jest + Allure)
        run: npm run test:unit
      
      - name: Upload Jest Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-jest-${{ matrix.os }}-node${{ matrix.node-version }}
          path: allure-results/

  # ============================================
  # JOB 2: API Tests (Cucumber + Allure)
  # ============================================
  api-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('package-lock.json') }}
      
      - name: Install dependencies
        run: npm ci
      
      - name: Start server
        run: |
          npm start &
          npx wait-on http://localhost:3000 --timeout 30000
        shell: bash
      
      - name: Run API tests (Cucumber + Allure)
        run: npm run test:api
      
      - name: Upload Cucumber Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-cucumber-${{ matrix.os }}-node${{ matrix.node-version }}
          path: allure-results/

  # ============================================
  # JOB 3: UI Tests (Playwright + Allure)
  # ============================================
  ui-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18.x, 20.x, 22.x]
        browser: [chromium, firefox, webkit]
        exclude:
          - os: windows-latest
            browser: webkit
          - os: macos-latest
            browser: webkit
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('package-lock.json') }}
      
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ matrix.browser }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install ${{ matrix.browser }} --with-deps
      
      - name: Start server
        run: |
          npm start &
          npx wait-on http://localhost:3000 --timeout 30000
        shell: bash
      
      - name: Run UI tests (Playwright + Allure)
        run: npm run test:ui -- --project=${{ matrix.browser }}
      
      - name: Upload Playwright Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-playwright-${{ matrix.browser }}-${{ matrix.os }}-node${{ matrix.node-version }}
          path: allure-results/

  # ============================================
  # JOB 4: Generate Allure Report
  # ============================================
  allure-report:
    runs-on: ubuntu-latest
    needs: [unit-tests, api-tests, ui-tests]
    if: always()
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: npm ci
      
      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          path: all-allure-results/
      
      - name: Merge Allure results
        run: |
          mkdir -p merged-allure-results
          find all-allure-results -name "*.json" -exec cp {} merged-allure-results/ \;
          find all-allure-results -name "*.txt" -exec cp {} merged-allure-results/ \;
          find all-allure-results -name "*.png" -exec cp {} merged-allure-results/ \;
          find all-allure-results -name "*.xml" -exec cp {} merged-allure-results/ \;
          find all-allure-results -name "*.yml" -exec cp {} merged-allure-results/ \;
          find all-allure-results -name "*.yaml" -exec cp {} merged-allure-results/ \;
        shell: bash
      
      - name: Generate Allure report
        run: |
          npx allure generate merged-allure-results --clean -o allure-report
      
      - name: Upload Allure report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
      
      - name: Deploy Allure report to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          destination_dir: allure-reports/${{ github.run_number }}

  # ============================================
  # JOB 5: Telegram Notification
  # ============================================
  notify-telegram:
    runs-on: ubuntu-latest
    needs: [unit-tests, api-tests, ui-tests, allure-report]
    if: always()
    steps:
      - name: Check overall status
        id: status
        run: |
          if [[ "${{ needs.unit-tests.result }}" == "success" ]] && \
             [[ "${{ needs.api-tests.result }}" == "success" ]] && \
             [[ "${{ needs.ui-tests.result }}" == "success" ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "message=✅ All tests passed successfully!" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "message=❌ Some tests failed. Check Allure report for details." >> $GITHUB_OUTPUT
          fi
      
      - name: Send Telegram notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🚀 CI/CD Pipeline - Subscription Service
            
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            
            📊 Test Results:
            • Unit Tests: ${{ needs.unit-tests.result }}
            • API Tests: ${{ needs.api-tests.result }}
            • UI Tests: ${{ needs.ui-tests.result }}
            
            ${{ steps.status.outputs.message }}
            
            🔗 View Allure Report: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/allure-reports/${{ github.run_number }}/