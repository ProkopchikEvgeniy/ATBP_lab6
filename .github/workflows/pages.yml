name: Deploy Allure Report to GitHub Pages

on:
  workflow_run:
    workflows: ["CI/CD Pipeline for Subscription Service"]
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Download artifact
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: ${{ github.event.workflow_run.id }},
            });
            const allureArtifact = artifacts.data.artifacts.find(
              (artifact) => artifact.name === "allure-report"
            );
            if (allureArtifact) {
              const download = await github.rest.actions.downloadArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: allureArtifact.id,
                archive_format: "zip",
              });
              const fs = require('fs');
              fs.writeFileSync('allure-report.zip', Buffer.from(download.data));
            }
      
      - name: Extract artifact
        run: unzip allure-report.zip -d allure-report
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './allure-report'
      
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4