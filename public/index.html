<!DOCTYPE html>
<html>
<head>
    <title>Subscription Management</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .container { max-width: 600px; margin: auto; }
        input, button { margin: 10px; padding: 10px; }
        button { cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background-color: #0056b3; }
        #subscriptionDetails { margin-top: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 4px; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Subscription Management</h1>
        <div>
            <h3>Renew Subscription</h3>
            <input type="text" id="userId" placeholder="Enter User ID" />
            <button id="viewSubscriptionBtn">View Subscription</button>
            <button id="renewBtn">Renew</button>
            <button id="cancelBtn">Cancel</button>
        </div>
        <div id="subscriptionDetails"></div>
        <div id="renewalMessage"></div>
    </div>
    <script>
        const userIdInput = document.getElementById('userId');
        const viewBtn = document.getElementById('viewSubscriptionBtn');
        const renewBtn = document.getElementById('renewBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const detailsDiv = document.getElementById('subscriptionDetails');
        const messageDiv = document.getElementById('renewalMessage');

        async function fetchSubscription() {
            const userId = userIdInput.value;
            const response = await fetch(`/api/subscription/${userId}`);
            if (response.ok) {
                const data = await response.json();
                detailsDiv.innerHTML = `
                    <h3>Subscription Details</h3>
                    <p>Plan: ${data.plan}</p>
                    <p>Status: ${data.status}</p>
                    <p>Expiry Date: ${data.expiryDate}</p>
                    <p>Auto-renew: ${data.autoRenew}</p>
                    <p>Payment Method: ${data.paymentMethod}</p>
                `;
                messageDiv.innerHTML = '';
            } else {
                detailsDiv.innerHTML = '<p class="error">User not found</p>';
            }
        }

        viewBtn.addEventListener('click', fetchSubscription);
        
        renewBtn.addEventListener('click', async () => {
            const userId = userIdInput.value;
            const response = await fetch(`/api/subscription/${userId}/renew`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ duration: 30 })
            });
            const data = await response.json();
            messageDiv.innerHTML = `<p class="success">${data.message}</p>`;
            fetchSubscription();
        });
        
        cancelBtn.addEventListener('click', async () => {
            const userId = userIdInput.value;
            const response = await fetch(`/api/subscription/${userId}/cancel`, {
                method: 'POST'
            });
            const data = await response.json();
            messageDiv.innerHTML = `<p class="success">${data.message}</p>`;
            fetchSubscription();
        });
    </script>
</body>
</html>
